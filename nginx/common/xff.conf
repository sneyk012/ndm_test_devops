# Доверенные прокси — только другие nginx во внутренней сети compose (internal).
# Клиенты с edge-сети (хост, контейнер client) НЕ доверяются.
geo $is_trusted_proxy {
    default         0;
    10.10.10.0/24   1;
}

# Сборка цепочки X-Forwarded-For:
#   недоверенный источник → IP клиента + IP текущего nginx
#   доверенный upstream   → существующая цепочка + IP текущего nginx
map $is_trusted_proxy $xff_to_upstream {
    0 "$remote_addr, $server_addr";
    1 "$http_x_forwarded_for, $server_addr";
}
