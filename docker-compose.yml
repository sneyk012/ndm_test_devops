services:
  app:
    build: ./app
    networks:
      internal:
        ipv4_address: 10.10.10.10
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/', timeout=2)",
        ]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 5s

  nginx3:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginx3.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/common:/etc/nginx/common:ro
    ports:
      - "8083:80"
    networks:
      edge: {}
      internal:
        ipv4_address: 10.10.10.13
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 3s

  nginx2:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginx2.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/common:/etc/nginx/common:ro
    ports:
      - "8082:80"
    networks:
      edge: {}
      internal:
        ipv4_address: 10.10.10.12
    depends_on:
      app:
        condition: service_healthy
      nginx3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 3s

  nginx1:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/nginx1.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/common:/etc/nginx/common:ro
    ports:
      - "8081:80"
    networks:
      edge: {}
      internal:
        ipv4_address: 10.10.10.11
    depends_on:
      app:
        condition: service_healthy
      nginx2:
        condition: service_healthy
      nginx3:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1/health"]
      interval: 3s
      timeout: 2s
      retries: 5
      start_period: 3s

  client:
    image: curlimages/curl:8.5.0
    networks:
      edge:
        ipv4_address: 10.20.20.100
    profiles:
      - test
    entrypoint: ["sleep", "infinity"]

networks:
  edge:
    driver: bridge
    ipam:
      config:
        - subnet: 10.20.20.0/24
  internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.10.10.0/24
